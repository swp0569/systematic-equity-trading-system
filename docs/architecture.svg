<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="690" viewBox="0 0 1200 690" role="img" aria-labelledby="title desc">
  <title id="title">Conceptual architecture of a systematic U.S.-equity trading system</title>
  <desc id="desc">A daily research-to-deployment workflow with validation, risk, recovery, and monitoring.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.62" stop-color="#164e63"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <style>
      .ui{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
      .title{font-size:31px;font-weight:750;fill:#ffffff;letter-spacing:-0.5px}
      .subtitle{font-size:15px;fill:#ccfbf1}
      .badge{font-size:10.5px;font-weight:750;letter-spacing:0.9px;fill:#ccfbf1}
      .eyebrow{font-size:11px;font-weight:750;letter-spacing:1.4px;fill:#64748b}
      .cardTitle{font-size:15px;font-weight:720;fill:#0f172a}
      .cardSub{font-size:12px;fill:#64748b}
      .num{font-size:11px;font-weight:750;fill:#ffffff}
      .controlTitle{font-size:15px;font-weight:720;fill:#0f172a}
      .controlSub{font-size:12.5px;fill:#64748b}
      .note{font-size:12px;fill:#64748b}
    </style>
  </defs>

  <rect width="1200" height="690" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="126" rx="22" fill="url(#hero)"/>
  <g class="ui">
    <text x="62" y="76" class="title">Systematic U.S.-Equity Trading System</text>
    <text x="62" y="108" class="subtitle">Research signal → controlled deployment workflow</text>

    <g transform="translate(802 61)">
      <rect width="86" height="31" rx="15.5" fill="#14b8a6" fill-opacity="0.22" stroke="#5eead4" stroke-opacity="0.65"/>
      <text x="43" y="20.5" text-anchor="middle" class="badge">PYTHON</text>
    </g>
    <g transform="translate(898 61)">
      <rect width="138" height="31" rx="15.5" fill="#14b8a6" fill-opacity="0.22" stroke="#5eead4" stroke-opacity="0.65"/>
      <text x="69" y="20.5" text-anchor="middle" class="badge">OFFLINE-VERIFIED</text>
    </g>
    <g transform="translate(1046 61)">
      <rect width="90" height="31" rx="15.5" fill="#14b8a6" fill-opacity="0.22" stroke="#5eead4" stroke-opacity="0.65"/>
      <text x="45" y="20.5" text-anchor="middle" class="badge">41 TESTS</text>
    </g>

    <text x="40" y="190" class="eyebrow">DAILY DECISION PIPELINE</text>
    <line x1="210" y1="290" x2="226" y2="290" stroke="#64748b" stroke-width="2.3" marker-end="url(#arrow)"/>
    <line x1="400" y1="290" x2="416" y2="290" stroke="#64748b" stroke-width="2.3" marker-end="url(#arrow)"/>
    <line x1="590" y1="290" x2="606" y2="290" stroke="#64748b" stroke-width="2.3" marker-end="url(#arrow)"/>
    <line x1="780" y1="290" x2="796" y2="290" stroke="#64748b" stroke-width="2.3" marker-end="url(#arrow)"/>
    <line x1="970" y1="290" x2="986" y2="290" stroke="#64748b" stroke-width="2.3" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <g>
        <rect x="40" y="218" width="170" height="144" rx="18" fill="#ffffff" stroke="#bae6fd" stroke-width="1.5"/>
        <rect x="40" y="218" width="170" height="7" rx="4" fill="#0284c7"/>
        <circle cx="69" cy="252" r="14" fill="#0284c7"/><text x="69" y="256" text-anchor="middle" class="num">1</text>
        <text x="64" y="296" class="cardTitle"><tspan x="64">Market</tspan><tspan x="64" dy="21">Data</tspan></text>
        <text x="64" y="341" class="cardSub">Daily inputs</text>
      </g>
      <g>
        <rect x="230" y="218" width="170" height="144" rx="18" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
        <rect x="230" y="218" width="170" height="7" rx="4" fill="#2563eb"/>
        <circle cx="259" cy="252" r="14" fill="#2563eb"/><text x="259" y="256" text-anchor="middle" class="num">2</text>
        <text x="254" y="296" class="cardTitle">Validation</text>
        <text x="254" y="323" class="cardSub"><tspan x="254">Freshness · coverage</tspan><tspan x="254" dy="18">completeness</tspan></text>
      </g>
      <g>
        <rect x="420" y="218" width="170" height="144" rx="18" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.5"/>
        <rect x="420" y="218" width="170" height="7" rx="4" fill="#7c3aed"/>
        <circle cx="449" cy="252" r="14" fill="#7c3aed"/><text x="449" y="256" text-anchor="middle" class="num">3</text>
        <text x="444" y="296" class="cardTitle"><tspan x="444">Signal &amp;</tspan><tspan x="444" dy="21">Sizing</tspan></text>
        <text x="444" y="341" class="cardSub">Whole-share targets</text>
      </g>
      <g>
        <rect x="610" y="218" width="170" height="144" rx="18" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
        <rect x="610" y="218" width="170" height="7" rx="4" fill="#ea580c"/>
        <circle cx="639" cy="252" r="14" fill="#ea580c"/><text x="639" y="256" text-anchor="middle" class="num">4</text>
        <text x="634" y="296" class="cardTitle"><tspan x="634">Risk &amp; Order</tspan><tspan x="634" dy="21">Controls</tspan></text>
        <text x="634" y="341" class="cardSub">Fail-closed gates</text>
      </g>
      <g>
        <rect x="800" y="218" width="170" height="144" rx="18" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
        <rect x="800" y="218" width="170" height="7" rx="4" fill="#059669"/>
        <circle cx="829" cy="252" r="14" fill="#059669"/><text x="829" y="256" text-anchor="middle" class="num">5</text>
        <text x="824" y="296" class="cardTitle"><tspan x="824">Broker</tspan><tspan x="824" dy="21">Interface</tspan></text>
        <text x="824" y="341" class="cardSub">Submission boundary</text>
      </g>
      <g>
        <rect x="990" y="218" width="170" height="144" rx="18" fill="#ffffff" stroke="#99f6e4" stroke-width="1.5"/>
        <rect x="990" y="218" width="170" height="7" rx="4" fill="#0f766e"/>
        <circle cx="1019" cy="252" r="14" fill="#0f766e"/><text x="1019" y="256" text-anchor="middle" class="num">6</text>
        <text x="1014" y="296" class="cardTitle"><tspan x="1014">Fill</tspan><tspan x="1014" dy="21">Reconciliation</tspan></text>
        <text x="1014" y="341" class="cardSub">Actual vs intended</text>
      </g>
    </g>

    <text x="40" y="420" class="eyebrow">SAFETY &amp; OPERATIONS PLANE</text>
    <path d="M315 362 V454" fill="none" stroke="#0f766e" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowTeal)"/>
    <path d="M695 362 V454" fill="none" stroke="#0f766e" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowTeal)"/>
    <path d="M1075 362 V454" fill="none" stroke="#0f766e" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowTeal)"/>

    <g filter="url(#shadow)">
      <rect x="145" y="458" width="280" height="112" rx="18" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
      <rect x="169" y="482" width="48" height="48" rx="14" fill="#dbeafe"/>
      <path d="M181 506h24M193 494v24" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
      <text x="237" y="498" class="controlTitle">Orchestration</text>
      <text x="237" y="524" class="controlSub"><tspan x="237">Run locks · idempotency</tspan><tspan x="237" dy="18">submission guards</tspan></text>

      <rect x="460" y="458" width="280" height="112" rx="18" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5"/>
      <rect x="484" y="482" width="48" height="48" rx="14" fill="#ede9fe"/>
      <path d="M496 506h24M508 494v24" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
      <text x="552" y="498" class="controlTitle">State &amp; Recovery</text>
      <text x="552" y="524" class="controlSub"><tspan x="552">Persistent reconcile gate</tspan><tspan x="552" dy="18">owned-position scope</tspan></text>

      <rect x="775" y="458" width="280" height="112" rx="18" fill="#ffffff" stroke="#99f6e4" stroke-width="1.5"/>
      <rect x="799" y="482" width="48" height="48" rx="14" fill="#ccfbf1"/>
      <path d="M811 514l9-10 8 6 8-15" fill="none" stroke="#0f766e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="867" y="498" class="controlTitle">Audit &amp; Monitoring</text>
      <text x="867" y="524" class="controlSub"><tspan x="867">Order records · NAV</tspan><tspan x="867" dy="18">alerts and diagnosis</tspan></text>
    </g>

    <rect x="40" y="604" width="1120" height="48" rx="18" fill="#ffffff" fill-opacity="0.84" stroke="#cbd5e1"/>
    <circle cx="66" cy="628" r="8" fill="#f59e0b"/>
    <text x="84" y="632" class="note">Deployment gate: broker-specific checks and multi-day read-only reconciliation remain before live submission</text>
  </g>
</svg>
